<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modération | MAKMUS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Libre Franklin', sans-serif;
            background: #f5f5f5;
            color: #121212;
        }

        .moderation-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e6e6e6;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notif-badge {
            background: #a30000;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e6e6e6;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Notifications */
        .notifications-panel {
            background: white;
            border-radius: 12px;
            border: 1px solid #e6e6e6;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .notifications-header {
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 1px solid #e6e6e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notifications-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            cursor: pointer;
        }

        .notification-item:hover {
            background: #f9f9f9;
        }

        .notification-item.unread {
            background: #fff8e1;
            border-left: 3px solid #ffc107;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .notification-message {
            font-size: 0.85rem;
            color: #666;
        }

        .notification-date {
            font-size: 0.7rem;
            color: #999;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: 1px solid #e6e6e6;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #a30000;
            color: white;
            border-color: #a30000;
        }

        /* Commentaires */
        .comments-list {
            background: white;
            border-radius: 12px;
            border: 1px solid #e6e6e6;
            overflow: hidden;
        }

        .comment-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .comment-item.hidden {
            background: #fff8e1;
            opacity: 0.8;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .comment-author {
            font-weight: 700;
            color: #a30000;
        }

        .comment-date {
            font-size: 0.7rem;
            color: #999;
        }

        .comment-article {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        .comment-message {
            font-family: 'Lora', serif;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .comment-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-delete, .btn-hide, .btn-unhide, .btn-approve {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-hide {
            background: #ffc107;
            color: #333;
        }

        .btn-hide:hover {
            background: #e0a800;
        }

        .btn-unhide {
            background: #28a745;
            color: white;
        }

        .btn-unhide:hover {
            background: #218838;
        }

        .moderation-note {
            margin-top: 10px;
            padding: 8px;
            background: #e9ecef;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .stats-badge {
            display: inline-block;
            background: #a30000;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .moderation-container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .comment-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="moderation-container">
        <div class="header">
            <h1>
                🛡️ Modération MAKMUS
                <span id="pending-badge" class="stats-badge" style="display:none;">0</span>
            </h1>
            <button class="logout-btn" id="logout-btn">Déconnexion</button>
        </div>

        <!-- Panel des notifications -->
        <div class="notifications-panel">
            <div class="notifications-header">
                <span><strong>🔔 Notifications</strong></span>
                <button id="mark-all-read" style="background:none; border:none; color:#a30000; cursor:pointer;">Tout marquer comme lu</button>
            </div>
            <div id="notifications-list" class="notifications-list">
                <div class="empty-state">Chargement...</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="active">📝 Commentaires actifs</button>
            <button class="tab-btn" data-tab="hidden">🚫 Commentaires masqués</button>
        </div>

        <!-- Commentaires actifs -->
        <div id="active-tab" class="comments-list">
            <div class="empty-state">Chargement...</div>
        </div>

        <!-- Commentaires masqués -->
        <div id="hidden-tab" class="comments-list" style="display: none;">
            <div class="empty-state">Chargement...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://logphtrdkpbfgtejtime.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvZ3BodHJka3BiZmd0ZWp0aW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzY4MDYsImV4cCI6MjA4NTc1MjgwNn0.Uoxiax-whIdbB5oI3bof-hN0m5O9PDi96zmaUZ6BBio';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let notificationInterval = null;

        // Vérifier l'authentification
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            loadNotifications();
            loadActiveComments();
            loadHiddenComments();
            startRealtimeNotifications();
        }

        // Démarrer les notifications en temps réel
        function startRealtimeNotifications() {
            // Écouter les nouveaux commentaires en temps réel
            supabase
                .channel('comments-channel')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'article_comments' },
                    (payload) => {
                        loadNotifications();
                        loadActiveComments();
                        updatePendingBadge();
                        showToast('📝 Nouveau commentaire !', 'info');
                    }
                )
                .subscribe();

            // Rafraîchir toutes les 30 secondes
            notificationInterval = setInterval(() => {
                loadNotifications();
                loadActiveComments();
            }, 30000);
        }

        // Mettre à jour le badge des notifications non lues
        async function updatePendingBadge() {
            const { count } = await supabase
                .from('admin_notifications')
                .select('*', { count: 'exact', head: true })
                .eq('is_read', false);
            
            const badge = document.getElementById('pending-badge');
            if (badge && count > 0) {
                badge.style.display = 'inline-block';
                badge.textContent = count;
                document.title = `(${count}) Modération MAKMUS`;
            } else if (badge) {
                badge.style.display = 'none';
                document.title = 'Modération MAKMUS';
            }
        }

        // Charger les notifications
        async function loadNotifications() {
            const { data, error } = await supabase
                .from('admin_notifications')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(30);

            const container = document.getElementById('notifications-list');
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucune notification</div>';
                return;
            }

            container.innerHTML = data.map(notif => `
                <div class="notification-item ${!notif.is_read ? 'unread' : ''}" data-id="${notif.id}">
                    <div class="notification-title">${escapeHtml(notif.title)}</div>
                    <div class="notification-message">${escapeHtml(notif.message)}</div>
                    <div class="notification-date">${new Date(notif.created_at).toLocaleString('fr-FR')}</div>
                </div>
            `).join('');

            // Marquer comme lu au clic
            document.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', async () => {
                    const id = item.dataset.id;
                    await supabase.from('admin_notifications').update({ is_read: true }).eq('id', id);
                    item.classList.remove('unread');
                    updatePendingBadge();
                });
            });

            updatePendingBadge();
        }

        // Marquer toutes les notifications comme lues
        document.getElementById('mark-all-read')?.addEventListener('click', async () => {
            await supabase.from('admin_notifications').update({ is_read: true }).eq('is_read', false);
            loadNotifications();
            showToast('Toutes les notifications ont été marquées comme lues');
        });

        // Charger les commentaires actifs
        async function loadActiveComments() {
            const { data, error } = await supabase
                .from('article_comments')
                .select(`
                    *,
                    articles:titre
                `)
                .eq('is_hidden', false)
                .order('created_at', { ascending: false });

            const container = document.getElementById('active-tab');
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucun commentaire actif</div>';
                return;
            }

            container.innerHTML = data.map(comment => `
                <div class="comment-item" data-id="${comment.id}">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.nom)}</span>
                        <span class="comment-date">${new Date(comment.created_at).toLocaleString('fr-FR')}</span>
                    </div>
                    <div class="comment-article">
                        Article: <strong>${escapeHtml(comment.articles?.titre || 'Article inconnu')}</strong>
                    </div>
                    <div class="comment-message">${escapeHtml(comment.message)}</div>
                    <div class="comment-actions">
                        <button class="btn-delete" onclick="deleteComment('${comment.id}')">🗑️ Supprimer</button>
                        <button class="btn-hide" onclick="hideComment('${comment.id}')">🙈 Masquer</button>
                    </div>
                    ${comment.moderation_note ? `<div class="moderation-note">📝 Note: ${escapeHtml(comment.moderation_note)}</div>` : ''}
                </div>
            `).join('');
        }

        // Charger les commentaires masqués
        async function loadHiddenComments() {
            const { data, error } = await supabase
                .from('article_comments')
                .select(`
                    *,
                    articles:titre
                `)
                .eq('is_hidden', true)
                .order('created_at', { ascending: false });

            const container = document.getElementById('hidden-tab');
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucun commentaire masqué</div>';
                return;
            }

            container.innerHTML = data.map(comment => `
                <div class="comment-item hidden" data-id="${comment.id}">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.nom)}</span>
                        <span class="comment-date">${new Date(comment.created_at).toLocaleString('fr-FR')}</span>
                    </div>
                    <div class="comment-article">
                        Article: <strong>${escapeHtml(comment.articles?.titre || 'Article inconnu')}</strong>
                    </div>
                    <div class="comment-message">${escapeHtml(comment.message)}</div>
                    <div class="comment-actions">
                        <button class="btn-delete" onclick="deleteComment('${comment.id}')">🗑️ Supprimer définitivement</button>
                        <button class="btn-unhide" onclick="unhideComment('${comment.id}')">✓ Restaurer</button>
                    </div>
                    ${comment.moderation_note ? `<div class="moderation-note">📝 Note: ${escapeHtml(comment.moderation_note)}</div>` : ''}
                </div>
            `).join('');
        }

        // Supprimer un commentaire
        window.deleteComment = async (commentId) => {
            const note = prompt('Raison de la suppression (optionnel):');
            if (!confirm('Supprimer définitivement ce commentaire ?')) return;
            
            const { error } = await supabase
                .from('article_comments')
                .delete()
                .eq('id', commentId);
            
            if (error) {
                showToast('Erreur lors de la suppression', 'error');
            } else {
                showToast('Commentaire supprimé', 'success');
                loadActiveComments();
                loadHiddenComments();
                if (note) {
                    console.log(`Commentaire ${commentId} supprimé: ${note}`);
                }
            }
        };

        // Masquer un commentaire
        window.hideComment = async (commentId) => {
            const note = prompt('Raison du masquage (injurieux, haineux, etc.) :');
            
            const { error } = await supabase
                .from('article_comments')
                .update({ 
                    is_hidden: true,
                    moderation_note: note || 'Commentaire problématique',
                    moderated_at: new Date().toISOString(),
                    moderated_by: currentUser?.id
                })
                .eq('id', commentId);
            
            if (error) {
                showToast('Erreur', 'error');
            } else {
                showToast('Commentaire masqué', 'success');
                loadActiveComments();
                loadHiddenComments();
            }
        };

        // Restaurer un commentaire masqué
        window.unhideComment = async (commentId) => {
            const { error } = await supabase
                .from('article_comments')
                .update({ 
                    is_hidden: false,
                    moderation_note: null
                })
                .eq('id', commentId);
            
            if (error) {
                showToast('Erreur', 'error');
            } else {
                showToast('Commentaire restauré', 'success');
                loadActiveComments();
                loadHiddenComments();
            }
        };

        // Changement d'onglet
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                document.getElementById('active-tab').style.display = tab === 'active' ? 'block' : 'none';
                document.getElementById('hidden-tab').style.display = tab === 'hidden' ? 'block' : 'none';
            });
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `position: fixed; bottom: 20px; right: 20px; background: ${type === 'error' ? '#dc3545' : type === 'info' ? '#17a2b8' : '#28a745'}; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Style pour l'animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // Déconnexion
        document.getElementById('logout-btn')?.addEventListener('click', async () => {
            if (notificationInterval) clearInterval(notificationInterval);
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        checkAuth();
    </script>
</body>
</html>
