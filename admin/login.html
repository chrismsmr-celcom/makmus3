<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Connexion | MAKMUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Libre Franklin', sans-serif;
            padding: 20px;
        }

        .login-container {
            max-width: 440px;
            width: 100%;
            background: white;
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.12);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            height: 60px;
            width: auto;
        }

        .login-title {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 8px;
            color: #121212;
            font-weight: 700;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e6e6e6;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Libre Franklin', sans-serif;
            transition: all 0.2s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a30000;
            box-shadow: 0 0 0 3px rgba(163,0,0,0.1);
        }

        .password-input {
            padding-right: 52px !important;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #888;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .toggle-password:hover {
            color: #a30000;
            background: rgba(163,0,0,0.05);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .btn-login {
            width: 100%;
            background: #a30000;
            color: white;
            border: none;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 12px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login svg {
            width: 18px;
            height: 18px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        .btn-login:hover {
            background: #7a0000;
            transform: scale(1.01);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #dc3545;
            font-size: 0.75rem;
            margin-top: 16px;
            text-align: center;
            padding: 10px;
            background: #fee;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error-msg svg {
            width: 16px;
            height: 16px;
            stroke: #dc3545;
            stroke-width: 2;
            fill: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.8rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e6e6e6;
            border-top-color: #a30000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .demo-hint {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e6e6e6;
            font-size: 0.7rem;
            text-align: center;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .demo-hint svg {
            width: 14px;
            height: 14px;
            stroke: #999;
            stroke-width: 2;
            fill: none;
        }

        .demo-hint strong {
            color: #a30000;
        }

        /* ========================================
           RESPONSIVE
        ========================================= */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
            
            .login-subtitle {
                font-size: 0.7rem;
            }
            
            .form-group input {
                padding: 12px 14px;
            }
            
            .password-input {
                padding-right: 46px !important;
            }
            
            .toggle-password {
                right: 10px;
                padding: 6px;
            }
            
            .toggle-password svg {
                width: 18px;
                height: 18px;
            }
            
            .btn-login {
                padding: 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .login-container {
                padding: 24px 20px;
            }
            
            .login-logo img {
                height: 50px;
            }
            
            .login-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="https://logphtrdkpbfgtejtime.supabase.co/storage/v1/object/public/Photo,%20Image/Untitled%20folder/MAK_MUS__1_-removebg-preview.png" alt="MAKMUS">
        </div>
        <h1 class="login-title">Administration</h1>
        <p class="login-subtitle">Accès réservé aux membres de la rédaction</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" autocomplete="email" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" class="password-input" autocomplete="current-password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Afficher le mot de passe">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="login-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M14 10L21 3M10 21H3v-6M4 20L10 14"/>
                </svg>
                Se connecter
            </button>
            
            <div id="login-error" class="error-msg" style="display: none;"></div>
            <div id="login-loading" class="loading">
                <span class="loading-spinner"></span>
                Connexion en cours...
            </div>
        </form>
        
        <div class="demo-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span><strong>Accès sécurisé</strong> — Seuls les membres autorisés peuvent accéder à l'administration</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://logphtrdkpbfgtejtime.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvZ3BodHJka3BiZmd0ZWp0aW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzY4MDYsImV4cCI6MjA4NTc1MjgwNn0.Uoxiax-whIdbB5oI3bof-hN0m5O9PDi96zmaUZ6BBio';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Éléments DOM
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const toggleBtn = document.getElementById('toggle-password');
            const loginBtn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            const loadingDiv = document.getElementById('login-loading');

            let isEyeOpen = false;

            // ========================================
            // TOGGLE PASSWORD (ŒIL SVG)
            // ========================================
            function updateEyeIcon() {
                if (!toggleBtn) return;
                toggleBtn.innerHTML = isEyeOpen ? 
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>` :
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>`;
            }

            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function() {
                    isEyeOpen = !isEyeOpen;
                    const type = isEyeOpen ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    updateEyeIcon();
                    toggleBtn.setAttribute('aria-label', isEyeOpen ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
                });
            }

            // ========================================
            // AFFICHER/MASQUER ERREUR
            // ========================================
            function showError(message) {
                errorDiv.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    ${message}
                `;
                errorDiv.style.display = 'flex';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 5000);
            }

            function hideError() {
                errorDiv.style.display = 'none';
                errorDiv.innerHTML = '';
            }

            // ========================================
            // VALIDATION EMAIL
            // ========================================
            function isValidEmail(email) {
                return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
            }

            // ========================================
            // VÉRIFIER SESSION EXISTANTE
            // ========================================
            async function checkExistingSession() {
                try {
                    const { data: { user }, error } = await supabase.auth.getUser();
                    if (user && !error) {
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    console.log('Aucune session active');
                }
            }

            // ========================================
            // CONNEXION
            // ========================================
            async function handleLogin(e) {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                hideError();
                
                // Validation
                if (!email) {
                    showError('Veuillez saisir votre email');
                    emailInput.focus();
                    return;
                }
                
                if (!isValidEmail(email)) {
                    showError('Email invalide. Exemple: nom@domaine.com');
                    emailInput.focus();
                    return;
                }
                
                if (!password) {
                    showError('Veuillez saisir votre mot de passe');
                    passwordInput.focus();
                    return;
                }
                
                // Afficher le loader
                loginBtn.disabled = true;
                loadingDiv.style.display = 'block';
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        loadingDiv.innerHTML = '<span class="loading-spinner"></span> Redirection...';
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 500);
                    }
                    
                } catch (error) {
                    let errorMessage = error.message;
                    if (errorMessage.includes('Invalid login credentials')) {
                        errorMessage = 'Email ou mot de passe incorrect';
                    } else if (errorMessage.includes('Email not confirmed')) {
                        errorMessage = 'Veuillez confirmer votre email avant de vous connecter';
                    } else if (errorMessage.includes('rate limit')) {
                        errorMessage = 'Trop de tentatives. Veuillez réessayer dans quelques minutes';
                    }
                    
                    showError(errorMessage);
                    loginBtn.disabled = false;
                    loadingDiv.style.display = 'none';
                    loadingDiv.innerHTML = '<span class="loading-spinner"></span> Connexion en cours...';
                }
            }

            // Événements
            form.addEventListener('submit', handleLogin);
            
            // Focus sur le champ email au chargement
            emailInput.focus();
            
            // Vérifier la session existante
            checkExistingSession();
            
            console.log('🔐 Page de connexion MAKMUS chargée - ' + new Date().toLocaleString());
        })();
    </script>
</body>
</html>
