<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Connexion | MAKMUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Libre Franklin', sans-serif;
        }
        .login-container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo img {
            height: 50px;
            width: auto;
        }
        .login-title {
            font-family: 'Lora', serif;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            background: #a30000;
            color: white;
            border: none;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-login:hover {
            background: #7a0000;
        }
        .error-msg {
            color: #a30000;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="https://logphtrdkpbfgtejtime.supabase.co/storage/v1/object/public/Photo,%20Image/Untitled%20folder/MAK_MUS__1_-removebg-preview.png" alt="MAKMUS">
        </div>
        <h1 class="login-title">Administration</h1>
        
        <!-- ✅ CHANGEMENT : plus d'action et onglet submit -->
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="login-btn">Se connecter</button>
            <div id="login-error" class="error-msg"></div>
            <div id="login-loading" class="loading">Connexion en cours...</div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var SUPABASE_URL = 'https://logphtrdkpbfgtejtime.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvZ3BodHJka3BiZmd0ZWp0aW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzY4MDYsImV4cCI6MjA4NTc1MjgwNn0.Uoxiax-whIdbB5oI3bof-hN0m5O9PDi96zmaUZ6BBio';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            // ✅ EMPÊCHER le rechargement de la page
            e.preventDefault();
            
            var email = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            var errorDiv = document.getElementById('login-error');
            var loginBtn = document.getElementById('login-btn');
            var loadingDiv = document.getElementById('login-loading');
            
            // Afficher le loader
            loginBtn.disabled = true;
            loadingDiv.style.display = 'block';
            errorDiv.textContent = '';
            
            try {
                var { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Connexion réussie, rediriger vers dashboard
                    window.location.href = 'dashboard.html';
                }
                
            } catch (error) {
                errorDiv.textContent = error.message || 'Erreur de connexion';
                loginBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
