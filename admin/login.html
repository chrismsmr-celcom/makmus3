<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Connexion | MAKMUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Libre Franklin', sans-serif;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .login-container:hover {
            transform: translateY(-2px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo img {
            height: 55px;
            width: auto;
        }

        .login-title {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 8px;
            color: #121212;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e6e6e6;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Libre Franklin', sans-serif;
            transition: all 0.2s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a30000;
            box-shadow: 0 0 0 3px rgba(163,0,0,0.1);
        }

        .password-input {
            padding-right: 48px !important;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            color: #888;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #a30000;
        }

        .btn-login {
            width: 100%;
            background: #a30000;
            color: white;
            border: none;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #7a0000;
            transform: scale(1.01);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #dc3545;
            font-size: 0.75rem;
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            background: #fee;
            border-radius: 8px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 0.8rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e6e6e6;
            border-top-color: #a30000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .demo-hint {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e6e6e6;
            font-size: 0.7rem;
            text-align: center;
            color: #999;
        }

        .demo-hint code {
            background: #f5f5f5;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #a30000;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-title {
                font-size: 1.4rem;
            }
            
            .form-group input {
                padding: 12px 14px;
            }
            
            .password-input {
                padding-right: 42px !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="https://logphtrdkpbfgtejtime.supabase.co/storage/v1/object/public/Photo,%20Image/Untitled%20folder/MAK_MUS__1_-removebg-preview.png" alt="MAKMUS">
        </div>
        <h1 class="login-title">Administration</h1>
        <p class="login-subtitle">Accès réservé aux membres de la rédaction</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" autocomplete="email" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" class="password-input" autocomplete="current-password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Afficher le mot de passe">
                        👁️
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="login-btn">Se connecter</button>
            
            <div id="login-error" class="error-msg"></div>
            <div id="login-loading" class="loading">
                <span class="loading-spinner"></span>
                Connexion en cours...
            </div>
        </form>
        
        <div class="demo-hint">
            💡 <strong>Accès sécurisé</strong> — Seuls les membres autorisés peuvent accéder à l'administration
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var SUPABASE_URL = 'https://logphtrdkpbfgtejtime.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvZ3BodHJka3BiZmd0ZWp0aW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzY4MDYsImV4cCI6MjA4NTc1MjgwNn0.Uoxiax-whIdbB5oI3bof-hN0m5O9PDi96zmaUZ6BBio';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ========================================
        // TOGGLE PASSWORD (ŒIL)
        // ========================================
        var toggleBtn = document.getElementById('toggle-password');
        var passwordInput = document.getElementById('login-password');
        
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', function() {
                var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                // Changer l'icône
                toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
                toggleBtn.setAttribute('aria-label', type === 'password' ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
            });
        }

        // ========================================
        // AUTO-CONNEXION (vérifier si déjà connecté)
        // ========================================
        async function checkExistingSession() {
            try {
                var { data: { user }, error } = await supabaseClient.auth.getUser();
                
                if (user && !error) {
                    // Déjà connecté, rediriger vers dashboard
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.log('Aucune session active');
            }
        }
        
        checkExistingSession();

        // ========================================
        // CONNEXION
        // ========================================
        var form = document.getElementById('login-form');
        var emailInput = document.getElementById('login-email');
        var loginBtn = document.getElementById('login-btn');
        var errorDiv = document.getElementById('login-error');
        var loadingDiv = document.getElementById('login-loading');

        // Validation email simple
        function isValidEmail(email) {
            return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            var email = emailInput.value.trim();
            var password = passwordInput.value;
            
            // Réinitialiser les messages d'erreur
            errorDiv.textContent = '';
            
            // Validation
            if (!email) {
                errorDiv.textContent = 'Veuillez saisir votre email';
                emailInput.focus();
                return;
            }
            
            if (!isValidEmail(email)) {
                errorDiv.textContent = 'Email invalide. Exemple: nom@domaine.com';
                emailInput.focus();
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Veuillez saisir votre mot de passe';
                passwordInput.focus();
                return;
            }
            
            // Afficher le loader
            loginBtn.disabled = true;
            loadingDiv.style.display = 'block';
            
            try {
                var { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Connexion réussie
                    errorDiv.textContent = '';
                    loadingDiv.innerHTML = '<span class="loading-spinner"></span> Redirection...';
                    
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 500);
                }
                
            } catch (error) {
                // Messages d'erreur plus clairs
                var errorMessage = error.message;
                if (errorMessage.includes('Invalid login credentials')) {
                    errorMessage = 'Email ou mot de passe incorrect';
                } else if (errorMessage.includes('Email not confirmed')) {
                    errorMessage = 'Veuillez confirmer votre email avant de vous connecter';
                } else if (errorMessage.includes('rate limit')) {
                    errorMessage = 'Trop de tentatives. Veuillez réessayer dans quelques minutes';
                }
                
                errorDiv.textContent = errorMessage;
                loginBtn.disabled = false;
                loadingDiv.style.display = 'none';
                loadingDiv.innerHTML = '<span class="loading-spinner"></span> Connexion en cours...';
                
                // Réinitialiser le loader pour la prochaine tentative
                setTimeout(function() {
                    if (loadingDiv.style.display === 'none') {
                        loadingDiv.innerHTML = '<span class="loading-spinner"></span> Connexion en cours...';
                    }
                }, 100);
            }
        }

        // Soumission du formulaire (clic ou touche Entrée)
        form.addEventListener('submit', handleLogin);
        
        // Optionnel : focus sur le champ email au chargement
        emailInput.focus();
        
        // Debug (pour toi en développement)
        console.log('🔐 Page de connexion MAKMUS chargée - ' + new Date().toLocaleString());
    </script>
</body>
</html>
