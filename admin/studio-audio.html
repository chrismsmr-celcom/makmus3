<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Audio | MAKMUS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* Vos styles existants... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background: #f5f5f5;
            color: #121212;
        }
        
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .admin-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e6e6e6;
        }
        
        .admin-nav a {
            font-family: 'Libre Franklin', sans-serif;
            text-decoration: none;
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .admin-nav a.active {
            color: #a30000;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #666;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            font-family: 'Lora', serif;
            font-size: 16px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .upload-area {
            border: 2px dashed #e6e6e6;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #a30000;
            background: #fff;
        }
        
        .upload-area.dragover {
            border-color: #a30000;
            background: #fef0f0;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            font-family: 'Libre Franklin', sans-serif;
            font-size: 14px;
            color: #888;
        }
        
        .file-info {
            margin-top: 10px;
            font-size: 12px;
            color: #28a745;
        }
        
        .image-preview {
            margin-top: 15px;
            width: 120px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        .btn-primary {
            background: #a30000;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 700;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Libre Franklin', sans-serif;
        }
        
        .status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .audio-list {
            margin-top: 40px;
            border-top: 1px solid #e6e6e6;
            padding-top: 30px;
        }
        
        .audio-list h3 {
            font-family: 'Libre Franklin', sans-serif;
            margin-bottom: 20px;
        }
        
        .audio-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            margin-bottom: 10px;
            background: white;
        }
        
        .audio-item-info {
            flex: 1;
        }
        
        .audio-item-title {
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .audio-item-meta {
            font-size: 12px;
            color: #888;
        }
        
        .audio-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            padding: 5px;
        }
        
        .edit-btn { color: #007bff; }
        .delete-btn { color: #dc3545; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 14px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        /* Ajout pour le champ durée caché */
        input[type="hidden"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="editor.html">Editeur</a>
            <a href="studio-audio.html" class="active">Studio Audio</a>
            <a href="#" id="logout-nav">Deconnexion</a>
        </div>
        
        <div id="status-message" class="status"></div>
        
        <h1 style="margin-bottom: 30px;">Gestion des Audios</h1>
        
        <form id="audio-form">
            <div class="form-group">
                <label>Titre de l'audio</label>
                <input type="text" id="audio-title" placeholder="Titre..." required>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="audio-description" placeholder="Description..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Type</label>
                <select id="audio-type">
                    <option value="podcast">Podcast</option>
                    <option value="resume">Résumé</option>
                    <option value="interview">Interview</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Source / Auteur</label>
                <input type="text" id="audio-source" placeholder="Ex: MAKMUS Studio">
            </div>
            
            <div class="form-group">
                <label>Catégorie</label>
                <input type="text" id="audio-category" placeholder="Ex: Politique, Économie, Sport">
            </div>
            
            <div class="form-group">
                <label>Image de couverture</label>
                <div class="upload-area" id="image-upload-area">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Cliquez ou déposez une image</div>
                    <input type="file" id="image-file" accept="image/*" style="display: none;">
                </div>
                <div class="image-preview" id="image-preview" style="display: none;">
                    <img id="preview-img" src="">
                </div>
                <input type="hidden" id="image-url">
            </div>
            
            <div class="form-group">
                <label>Fichier audio (MP3)</label>
                <div class="upload-area" id="audio-upload-area">
                    <div class="upload-icon">🎵</div>
                    <div class="upload-text">Cliquez ou déposez un fichier audio (MP3)</div>
                    <input type="file" id="audio-file" accept="audio/*" style="display: none;">
                </div>
                <div id="audio-info" class="file-info" style="display: none;"></div>
                <input type="hidden" id="audio-url">
                <!-- ✅ AJOUT DU CHAMP CACHÉ POUR LA DURÉE -->
                <input type="hidden" id="audio-duration-data" value="0">
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="audio-published"> Publié
                </label>
            </div>
            
            <div class="action-buttons">
                <button type="button" class="btn-secondary" id="cancel-btn">Annuler</button>
                <button type="submit" class="btn-primary" id="save-btn">Sauvegarder</button>
            </div>
        </form>
        
        <div class="audio-list">
            <h3>Audios existants</h3>
            <div id="audios-list"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/audio-editor.js"></script>
</body>
</html>
