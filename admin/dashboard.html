<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MAKMUS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .dashboard-title {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
        }
        .logout-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #a30000;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            background: #a30000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary {
            background: #333;
        }
        .articles-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #ddd;
        }
        .articles-table th,
        .articles-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .articles-table th {
            background: #f5f5f5;
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-published {
            background: #d4edda;
            color: #155724;
        }
        .status-draft {
            background: #fff3cd;
            color: #856404;
        }
        .action-link {
            color: #a30000;
            text-decoration: none;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Dashboard MAKMUS</h1>
            <button class="logout-btn" id="logout-btn">Déconnexion</button>
        </div>
        
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="total-articles">-</div>
                <div class="stat-label">Total articles</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="published-articles">-</div>
                <div class="stat-label">Publiés</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="draft-articles">-</div>
                <div class="stat-label">Brouillons</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-views">-</div>
                <div class="stat-label">Vues totales</div>
            </div>
        </div>
        
        <div class="actions">
            <a href="editor.html" class="btn">+ Nouvel article</a>
            <a href="studio.html" class="btn btn-secondary">Studio média</a>
        </div>
        
        <table class="articles-table">
            <thead>
                <tr>
                    <th>Titre</th>
                    <th>Catégorie</th>
                    <th>Statut</th>
                    <th>Vues</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="articles-list">
                <tr><td colspan="6" style="text-align:center">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
